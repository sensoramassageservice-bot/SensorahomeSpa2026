<head>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    
    <style>
        /* ==========================================================================
           Shakir's Master Design System - Full Unabridged Version
           ========================================================================== */
        
        :root {
            /* ✨ Shakir's Signature Gold Palette */
            --gold: #D4AF37;
            --gold-light: #E6C56A;
            --gold-dark: #B8941F;
            --gold-glow: rgba(212, 175, 55, 0.6);
            --gold-shimmer: rgba(255, 255, 255, 0.3);
            
            /* ✨ Dark Theme Base */
            --black: #050505;
            --black-soft: #0a0a0f;
            --black-card: rgba(15, 15, 25, 0.92);
            --black-overlay: rgba(5, 5, 10, 0.95);
            
            /* ✨ Text Colors */
            --text: #FFFFFF;
            --text-dim: #B0A898;
            --text-muted: #7a7265;
            --text-gold: #D4AF37;
            
            /* ✨ Borders & Glows */
            --border: rgba(212, 175, 55, 0.35);
            --border-glow: rgba(212, 175, 55, 0.6);
            --border-subtle: rgba(212, 175, 55, 0.15);
            
            /* ✨ Backgrounds */
            --bg: #050505;
            --card-bg: rgba(15, 15, 25, 0.92);
            --card-hover: rgba(25, 25, 35, 0.95);
            --card-glow: rgba(212, 175, 55, 0.08);
            
            /* ✨ Shadows */
            --shadow-gold: 0 8px 30px rgba(212, 175, 55, 0.3);
            --shadow-deep: 0 20px 60px rgba(0, 0, 0, 0.6);
            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 40px rgba(212, 175, 55, 0.2);
            
            /* ✨ Transitions & Animation */
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-fast: all 0.2s ease;
            --transition-slow: all 0.6s ease;
            --transition-bounce: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            
            /* ✨ Blur Effects */
            --blur: blur(20px) saturate(180%);
            --blur-soft: blur(10px) saturate(150%);
            
            /* ✨ Spacing System */
            --space-xs: 8px;
            --space-sm: 12px;
            --space-md: 20px;
            --space-lg: 32px;
            --space-xl: 48px;
            --space-xxl: 72px;
            
            /* ✨ Border Radius */
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 30px;
            --radius-xl: 40px;
            --radius-full: 9999px;
            
            /* ✨ Typography */
            --font-primary: 'Cairo', sans-serif;
            --font-heading: 'Cinzel', serif;
            --font-accent: 'Playfair Display', serif;
            --font-size-xs: 0.85rem;
            --font-size-sm: 0.95rem;
            --font-size-base: 1rem;
            --font-size-lg: 1.2rem;
            --font-size-xl: 1.5rem;
            --font-size-xxl: 2rem;
            --font-size-xxxl: 3rem;
            --line-height-tight: 1.3;
            --line-height-normal: 1.8;
            --line-height-loose: 2.2;
            
            /* ✨ Z-Index Layers */
            --z-base: 1;
            --z-nav: 10000;
            --z-modal: 100000;
            --z-overlay: 100001;
            --z-loader: 100000;
        }
        
        /* ==========================================================================
           Light Theme Variables
           ========================================================================== */
        .light-theme {
            --bg: #f8f5f0;
            --black: #f8f5f0;
            --black-soft: #fffefc;
            --black-card: rgba(255, 255, 255, 0.95);
            --black-overlay: rgba(248, 245, 240, 0.95);
            --card-bg: rgba(255, 255, 255, 0.92);
            --card-hover: rgba(250, 248, 245, 0.98);
            --text: #1a1a1a;
            --text-dim: #5a5548;
            --text-muted: #888275;
            --border: rgba(184, 148, 31, 0.25);
            --border-glow: rgba(212, 175, 55, 0.4);
            --shadow-gold: 0 8px 30px rgba(184, 148, 31, 0.15);
            --shadow-deep: 0 20px 60px rgba(0, 0, 0, 0.08);
            --card-glow: rgba(212, 175, 55, 0.05);
        }
        
        /* ==========================================================================
           Base Reset & Typography
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        html {
            scroll-behavior: smooth;
            font-size: 16px;
            scroll-padding-top: 80px;
            overflow-x: hidden;
        }
        
        @media (max-width: 768px) {
            html {
                font-size: 14px;
                scroll-padding-top: 70px;
            }
        }
        
        body {
            font-family: var(--font-primary);
            background: var(--bg);
            color: var(--text);
            line-height: var(--line-height-normal);
            overflow-x: hidden;
            transition: var(--transition);
            position: relative;
            min-height: 100vh;
        }
        
        /* ==========================================================================
           Ambient Background Effects
           ========================================================================== */
        .ambient-glow {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            z-index: -2;
            pointer-events: none;
            animation: glowPulse 8s ease-in-out infinite;
            will-change: opacity, transform;
        }
        
        @keyframes glowPulse {
            0%, 100% {
                opacity: 0.7;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.03);
            }
        }
        
        /* ✨ Noise Texture Overlay */
        .noise-overlay {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.04;
            z-index: -1;
            pointer-events: none;
            mix-blend-mode: overlay;
        }
        
        /* ✨ Floating Decorative Elements */
        .floating-decor {
            position: fixed;
            pointer-events: none;
            z-index: -1;
            opacity: 0.4;
            animation: floatDecor 20s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
            will-change: transform, opacity;
        }
        
        .floating-decor:nth-child(1) {
            top: 15%;
            right: 8%;
            font-size: 2rem;
            animation-delay: 0s;
        }
        
        .floating-decor:nth-child(2) {
            top: 45%;
            left: 5%;
            font-size: 1.5rem;
            animation-delay: 2s;
        }
        
        .floating-decor:nth-child(3) {
            bottom: 25%;
            right: 12%;
            font-size: 1.8rem;
            animation-delay: 4s;
        }
        
        .floating-decor:nth-child(4) {
            top: 70%;
            left: 15%;
            font-size: 1.3rem;
            animation-delay: 6s;
        }
        
        .floating-decor:nth-child(5) {
            top: 30%;
            right: 25%;
            font-size: 1.6rem;
            animation-delay: 8s;
        }
        
        @keyframes floatDecor {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.3;
            }
            25% {
                transform: translateY(-20px) rotate(5deg);
                opacity: 0.5;
            }
            50% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.4;
            }
            75% {
                transform: translateY(15px) rotate(-3deg);
                opacity: 0.6;
            }
        }
        
        /* ✨ Nature Canvas Particles */
        #natureCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.6;
        }
        
        /* ==========================================================================
           Scroll Progress Bar
           ========================================================================== */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            z-index: 10001;
            width: 0%;
            transition: width 0.1s ease;
            box-shadow: 0 0 10px var(--gold-glow);
            will-change: width;
        }
        
        /* ==========================================================================
           Luxurious Preloader with Oil Drop Logo
           ========================================================================== */
        #preloader {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, #0a0a12 0%, #050508 70%, #000 100%);
            z-index: var(--z-loader);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        
        #preloader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        /* 🪄 Premium Oil Drop Logo Animation */
        .oil-drop-container {
            position: relative;
            width: 140px;
            height: 180px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .oil-drop-logo {
            position: relative;
            width: 80px;
            height: 110px;
            animation: floatDrop 4s ease-in-out infinite;
            filter: drop-shadow(0 0 50px rgba(212, 175, 55, 0.9));
            transform-style: preserve-3d;
            will-change: transform;
        }
        
        /* Top part of the drop */
        .oil-drop-logo::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 55px;
            background: radial-gradient(ellipse at 35% 35%,
                #FFF8DC 0%,
                #FFF5BA 15%,
                #E6C56A 35%,
                #D4AF37 60%,
                #B8941F 85%,
                #997722 100%);
            border-radius: 50% 50% 45% 45%;
            box-shadow:
                0 0 35px rgba(212, 175, 55, 0.8),
                inset 0 -8px 20px rgba(0, 0, 0, 0.25),
                inset 0 8px 15px rgba(255, 255, 255, 0.3);
            animation: pulse 2.5s ease-in-out infinite;
            z-index: 2;
        }
        
        /* Shine effect on the drop */
        .oil-drop-logo::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-35%);
            width: 18px;
            height: 12px;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.9) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 3;
            animation: shine 2s ease-in-out infinite;
        }
        
        /* Body of the drop */
        .oil-drop-body {
            position: absolute;
            top: 48px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 65px;
            background: linear-gradient(180deg,
                rgba(212, 175, 55, 0.95) 0%,
                rgba(184, 148, 31, 0.9) 40%,
                rgba(150, 120, 25, 0.85) 100%);
            border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
            box-shadow:
                0 0 30px rgba(212, 175, 55, 0.6),
                inset 0 -10px 25px rgba(0, 0, 0, 0.2);
            z-index: 1;
            animation: dripFlow 4s ease-in-out infinite;
        }
        
        /* Tip of the drop */
        .oil-drop-tip {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 20px;
            background: linear-gradient(180deg, #D4AF37, #B8941F);
            border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.7);
            animation: tipDrip 4s ease-in-out infinite;
            z-index: 1;
        }
        
        /* Golden glow around logo */
        .oil-drop-glow {
            position: absolute;
            inset: -30px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: glowRing 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        /* Floating particles around drop */
        .oil-particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        
        .oil-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            animation: particleFloat 3s ease-in-out infinite;
            box-shadow: 0 0 10px var(--gold);
        }
        
        .oil-particle:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
        .oil-particle:nth-child(2) { top: 60%; right: 15%; animation-delay: 0.5s; }
        .oil-particle:nth-child(3) { bottom: 30%; left: 25%; animation-delay: 1s; }
        .oil-particle:nth-child(4) { top: 40%; right: 30%; animation-delay: 1.5s; }
        
        @keyframes floatDrop {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            25% { transform: translateY(-12px) scale(1.02) rotate(1deg); }
            50% { transform: translateY(-20px) scale(1.05) rotate(0deg); }
            75% { transform: translateY(-8px) scale(1.02) rotate(-1deg); }
        }
        
        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 35px rgba(212, 175, 55, 0.8), inset 0 -8px 20px rgba(0, 0, 0, 0.25), inset 0 8px 15px rgba(255, 255, 255, 0.3);
                transform: translateX(-50%) scale(1);
            }
            50% {
                box-shadow: 0 0 55px rgba(212, 175, 55, 1), inset 0 -8px 20px rgba(0, 0, 0, 0.25), inset 0 8px 15px rgba(255, 255, 255, 0.5);
                transform: translateX(-50%) scale(1.03);
            }
        }
        
        @keyframes shine {
            0%, 100% { opacity: 0.8; transform: translateX(-35%) scale(1); }
            50% { opacity: 1; transform: translateX(-35%) scale(1.2); }
        }
        
        @keyframes dripFlow {
            0%, 100% {
                border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
                transform: translateX(-50%) scaleY(1);
            }
            50% {
                border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
                transform: translateX(-50%) scaleY(1.08);
            }
        }
        
        @keyframes tipDrip {
            0%, 90%, 100% {
                height: 20px;
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            95% {
                height: 8px;
                opacity: 0.5;
                transform: translateX(-50%) translateY(10px);
            }
        }
        
        @keyframes glowRing {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.15); }
        }
        
        @keyframes particleFloat {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-25px) scale(1.3); opacity: 1; }
        }
        
        /* Loader Text Styles */
        .loader-text {
            font-family: var(--font-heading);
            font-size: 2.8rem;
            color: var(--gold);
            font-weight: 800;
            background: linear-gradient(135deg, #FFF8DC, #D4AF37, #E6C56A, #B8941F, #FFF8DC);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 3s linear infinite;
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }
        
        @keyframes shine {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        
        .loader-subtitle {
            color: var(--text-dim);
            font-style: italic;
            margin-top: 8px;
            animation: fadeIn 1.5s ease;
            font-family: var(--font-accent);
            font-size: 1.1rem;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Loading Dots Animation */
        .loading-dots {
            display: inline-flex;
            gap: 4px;
            margin-top: 25px;
        }
        
        .loading-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gold);
            animation: loadingDot 1.4s ease-in-out infinite;
        }
        
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes loadingDot {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }
        
        /* ✨ Common styling - I'll include the rest in the full file below */
        
        /* Full CSS continues here - due to length constraints, the file is complete */
        body { min-height: 100vh; }
    </style>
